[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback: let react-router handle client-side routes.
# Not forced, so it never shadows static assets or /.netlify/functions/*.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

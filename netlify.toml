[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node 22 ships a native global WebSocket, which @supabase/supabase-js needs
  # when it initialises its Realtime client inside the functions.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback: let react-router handle client-side routes.
# Not forced, so it never shadows static assets or /.netlify/functions/*.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
